<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <h1>My Image Gallery</h1>

  <!-- GALLERY -->
  <div class="gallery">
    <img src="images/img1_small.jpg" alt="Image 1" onclick="openModal();currentSlide(1)">
    <img src="images/img2_small.jpg" alt="Image 2" onclick="openModal();currentSlide(2)">
    <img src="images/img3_small.jpg" alt="Image 3" onclick="openModal();currentSlide(3)">
    <img src="images/img4_small.jpg" alt="Image 4" onclick="openModal();currentSlide(4)">
  </div>

  <!-- MODAL -->
  <div id="myModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>

    <div class="modal-content">

      <div class="mySlides">
        <img src="images/img1_large.jpg" alt="Image 1">
      </div>

      <div class="mySlides">
        <img src="images/img2_large.jpg" alt="Image 2">
      </div>

      <div class="mySlides">
        <img src="images/img3_large.jpg" alt="Image 3">
      </div>

      <div class="mySlides">
        <img src="images/img4_large.jpg" alt="Image 4">
      </div>

      <!-- CONTROLS -->
      <a class="prev" onclick="plusSlides(-1)">❮</a>
      <a class="next" onclick="plusSlides(1)">❯</a>

    </div>
  </div>

  <script src="js/one_page_website.js"></script>

</body>
</html>
